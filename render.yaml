services:
  - type: web
    name: grok2api
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: TZ
        value: Asia/Shanghai
      - key: LOG_LEVEL
        value: INFO
      - key: SERVER_HOST
        value: 0.0.0.0
      - key: SERVER_WORKERS
        value: 1
      - key: ACCOUNT_STORAGE
        value: postgresql
      - key: ACCOUNT_POSTGRESQL_URL
        sync: false
